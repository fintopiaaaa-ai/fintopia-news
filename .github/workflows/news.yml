name: Fintopia News Bot
on:
  schedule:
    - cron: '*/15 2-15 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: fintopia-news
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow
      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:   ${{ secrets.TELEGRAM_CHANNEL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python news_bot.py
      - name: Save dedup state
        run: |
          git config user.name  "fintopia-bot"
          git config user.email "bot@fintopia.local"
          git add state/posted.json
          git commit -m "update news state [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
